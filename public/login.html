<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login do Aluno</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 50px;
            text-align: center;
            background-color: #f9f9f9;
        }
        input, button {
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            font-size: 1em;
        }
        input {
            width: 250px;
            border: 1px solid #ccc;
        }
        button {
            background-color: #3B6EA5;
            color: white;
            border: none;
        }
    </style>
</head>
<body>
    <h2>Login do Estudante</h2>
    <p>Digite seu nome de usuario:</p>
    <input type="text" id="usuario" placeholder="Seu nome ou ID">
    <br>
    <button onclick="verificarLogin()">Entrar</button>
    <p id="mensagem" style="color: red; margin-top: 20px;"></p>

   <script>
  async function verificarLogin() {
  const usuario = document.getElementById('usuario').value.trim();
  const senha = document.getElementById('senha').value;
  const mensagem = document.getElementById('mensagem');

  try {
    const resposta = await fetch("https://enem-facil.onrender.com/auth/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ usuario, senha })
    });

    const dados = await resposta.json();

    if (resposta.ok) {
      localStorage.setItem("token", dados.token);
      localStorage.setItem("aluno", JSON.stringify(dados.aluno));

      window.location.href = "dashboard.html";
    } else {
      mensagem.textContent = "❌ " + dados.error;
    }

  } catch (erro) {
    console.log(erro);
    mensagem.textContent = "❌ Erro ao conectar com servidor.";
  }
}
</script>
</body>
</html>
