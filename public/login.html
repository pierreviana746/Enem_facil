<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login do Aluno</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 50px;
            text-align: center;
            background-color: #f9f9f9;
        }
        input, button {
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            font-size: 1em;
        }
        input {
            width: 250px;
            border: 1px solid #ccc;
        }
        button {
            background-color: #3B6EA5;
            color: white;
            border: none;
        }
    </style>
</head>
<body>
    <h2>Login do Estudante</h2>
    <p>Digite seu nome de usuário:</p>
    <input type="text" id="usuario" placeholder="Seu nome ou ID">
    <br>
    <button onclick="verificarLogin()">Entrar</button>
    <p id="mensagem" style="color: red; margin-top: 20px;"></p>

   <script>
  function verificarLogin() {
    const usuario = document.getElementById('usuario').value.trim().toLowerCase();
    const mensagem = document.getElementById('mensagem');
    
    const alunos = JSON.parse(localStorage.getItem("alunos")) || [];

    if (alunos.includes(usuario)) {
      localStorage.setItem("aluno", usuario);
      window.location.href = "dashboard.html";
    } else {
      mensagem.textContent = "❌ Usuário não encontrado. Cadastre-se primeiro.";
    }
  }
</script>

</body>
</html>
