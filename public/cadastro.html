<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Cadastro de Estudante</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
      background-color: #f0f0f0;
    }

    .form-container {
      background-color: white;
      padding: 30px;
      display: inline-block;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, button {
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      font-size: 1em;
    }

    input {
      width: 250px;
      border: 1px solid #ccc;
      display: block;
      margin: 10px auto;
    }

    button {
      background-color: #3B6EA5;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #2A4D69;
    }

    p {
      margin-top: 20px;
    }

    .mensagem {
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Cadastro de Novo Estudante</h2>

    <input type="text" id="nome" placeholder="Nome completo" />
    <input type="date" id="dataNascimento" />
    <input type="email" id="email" placeholder="E-mail" />
    <input type="text" id="usuario" placeholder="Usuário para login" />
    <input type="password" id="senha" placeholder="Senha" />
    
    <button onclick="cadastrar()">Cadastrar</button>

    <p id="mensagem" class="mensagem"></p>
    <a href="index.html">← Já tenho conta</a>
  </div>

<script>
async function cadastrar() {

  const nome = document.getElementById('nome').value.trim();
  const dataNascimento = document.getElementById('dataNascimento').value;
  const email = document.getElementById('email').value.trim().toLowerCase();
  const usuario = document.getElementById('usuario').value.trim().toLowerCase();
  const senha = document.getElementById('senha').value;

  const mensagem = document.getElementById('mensagem');

  // validação básica
  if (!nome || !dataNascimento || !email || !usuario || !senha) {

    mensagem.style.color = "red";
    mensagem.textContent = "⚠️ Todos os campos são obrigatórios.";

    return;
  }

  try {

    const resposta = await fetch("https://enem-facil.onrender.com/auth/cadastro", {

      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify({
        nome,
        dataNascimento,
        email,
        usuario,
        senha
      })
    });

    const dados = await resposta.json();

    if (resposta.ok) {

      mensagem.style.color = "green";
      mensagem.textContent = "✅ Cadastro realizado com sucesso!";

      // limpar campos
      document.getElementById('nome').value = "";
      document.getElementById('dataNascimento').value = "";
      document.getElementById('email').value = "";
      document.getElementById('usuario').value = "";
      document.getElementById('senha').value = "";

      // redirecionar para login
      setTimeout(() => {
        window.location.href = "index.html";
      }, 1500);

    } else {

      mensagem.style.color = "orange";
      mensagem.textContent = dados.error;
    }

  } catch (erro) {

    console.log(erro);

    mensagem.style.color = "red";
    mensagem.textContent = "❌ Erro ao conectar com servidor.";
  }
}
</script>
</body>
</html>
